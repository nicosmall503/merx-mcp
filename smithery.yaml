startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      MERX_API_KEY:
        type: string
        description: "API key from merx.exchange (optional for read-only tools)"
      TRON_PRIVATE_KEY:
        type: string
        description: "TRON private key for signing transactions (optional)"
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["merx-mcp"],
      env: {
        MERX_API_KEY: config.MERX_API_KEY || "",
        TRON_PRIVATE_KEY: config.TRON_PRIVATE_KEY || ""
      }
    })
